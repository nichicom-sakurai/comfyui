[tools]
python = "3.13.13"

[tasks.bootstrap]
description = "Create the virtual environment and install comfy-cli"
run = """
set -euo pipefail
python -m venv .venv
.venv/bin/python -m pip install --upgrade pip 'comfy-cli==1.12.0'
"""

[tasks.install]
description = "Install ComfyUI and ComfyUI-Manager into the local workspace"
depends = ["bootstrap"]
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" install --version latest --m-series --fast-deps"

[tasks.launch]
description = "Launch the local ComfyUI instance"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" launch"

[tasks.start]
description = "Launch ComfyUI in the background"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" launch --background"

[tasks.stop]
description = "Stop the background ComfyUI instance"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" stop"

[tasks.doctor]
description = "Show the active Python and ComfyUI CLI environment"
run = """
set -euo pipefail
python --version
.venv/bin/python --version
.venv/bin/comfy --version
.venv/bin/comfy --workspace "$PWD/workspace" which
"""
