[tools]
python = "3.13.13"

[tasks.bootstrap]
description = "仮想環境を作成し、comfy-cliをインストール"
run = """
set -euo pipefail
python -m venv .venv
.venv/bin/python -m pip install --upgrade pip 'comfy-cli==1.12.0'
"""

[tasks.setup-comfyui]
description = "ローカルワークスペースにComfyUIとComfyUI-Managerをインストール"
depends = ["bootstrap"]
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" install --version latest --m-series --fast-deps"

[tasks.launch]
description = "ローカルのComfyUIを起動"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" launch"

[tasks.start]
description = "ComfyUIをバックグラウンドで起動"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" launch --background"

[tasks.stop]
description = "バックグラウンドで動作中のComfyUIを停止"
run = "PATH=\"$PWD/.venv/bin:$PATH\" comfy --workspace \"$PWD/workspace\" stop"

[tasks.doctor]
description = "使用中のPythonとComfyUI CLI環境を表示"
run = """
set -euo pipefail
python --version
.venv/bin/python --version
.venv/bin/comfy --version
.venv/bin/comfy --workspace "$PWD/workspace" which
"""
